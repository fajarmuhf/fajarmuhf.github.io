<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Fajarmuhf - TV Masjid Controller</title>
	<script src="jquery-3.2.1.min.js"></script>
	<style type="text/css">
		body, html {
		  height: 100%;
		  margin: 0;
		}

		#daftar{
		    margin: auto;
			margin-top:12px;
		    text-align: center;
		}

		button {
		    background-color: #04AA6D;
		    color: white;
		    padding: 12px 20px;
		    border: none;
		    border-radius: 4px;
		    cursor: pointer;
		    margin: auto;
		    text-align: center;
		}

		.bg {
		  /* The image used */
		  background-image: url("kabah.jpg");

		  /* Full height */
		  height: 100%; 

		  /* Center and scale the image nicely */
		  background-position: 0px -200px;
		  background-repeat: no-repeat;
		  background-size: cover;
		}
		.judul{
			position: fixed;
    		top: 20px;
    		width: 100%;
	    	background: navy;
	    	color: white;	
	    	font-size: 80px;
	    	text-align: center;
		}
		.midcontainer{
			position: fixed;
    		top: 60px;
    		width: 100%;
	    	font-size: 80px;
	    	text-align: center;
		}
		.jam{
	    	background: navy;
	    	color: white;	
			position: fixed;
			width: 27%;
    		margin-right: 30px;
    		right: 30px;
    		border-radius: 15px;
		}
		.counter{
	    	background: navy;
	    	color: white;	
			position: fixed;
			width: 20%;
    		margin-left: 60px;
    		left: 0px;
    		border-radius: 15px;
		}
		.inputSholat{
	    	color: white;	
			width: 20%;
    		margin: auto;
			padding:auto;
			text-align:center;
    		border-radius: 15px;
			visibility: hidden;
		}
		.totalwaktu{
			width:60%;
			line-height:40px;
			font-size:85px;
		}
	    .footer{
	    	position: fixed;
    		bottom: 25px;
    		width: 100%;
	    	background: navy;
	    	color: white;
	    	overflow: hidden;
	    }
	    .middleStart{
	    	position: fixed;
    		bottom: 50%;
    		left: 35%;
    		width: 30%;
    		margin: auto;
    		text-align: center;
	    	background: navy;
	    	color: white;
	    	overflow: hidden;
	    	font-size: 40px;
	    }
	    .jadwalsholat{
	    	padding-left: 25px;
	    	padding-right: 20px;
	    	position: fixed;
    		bottom: 90px;
    		width: 100%;
	    	background: navy;
	    	color: white;
	    	overflow: hidden;
	    	font-size: 85px;
	    }
		.jadwalsholat::-webkit-input-placeholder {
			font-size: 85px;
		}
	    .subjadwal{
	    	float: left;
	    	width: 13.9%;
	    	text-align: center;
	    }
	    section.container {
		    display: flex;
		    flex-direction: column;
		    justify-content: center;
		}
		.marquee {
		    position: relative;
		    top: 0;
		    left: 0;
		    width: 100%;
		    height: 60px;
		    display: block;
		    transform-origin: 50% 100%;
		    transition: transform 0.25s;
		}
		.topcontent,.middlecontent{
			font-size: 40px;
		}
		.middlecontent{
			color: lime;
		}

		.topcontent,.bottomcontent,.middlecontent{
			width: 100%;
		}

		.marquee .inner {
		    position: absolute;
		    top: 0;
		    left: 0;
		    display: flex;
		    align-items: flex-end;
		    color: white;
	    	font-size: 60px;
		    white-space: nowrap;
		}

		.marquee .inner > * {
		    padding: 0 1rem;
		}

		.bgblack{
			position: fixed;
			top: 0px;
			left: 0px;
			width: 100%;
			height: 100%;
			background-color: black;
			visibility: hidden;
		}
	</style>
</head>
<body>
	<form id='daftar' method="GET">
		<button>Al Muhajirin Control</button>
	</form>
	<script type="text/javascript">
		const url = "https://api.ngrok.com/endpoints";
		const token = "2NY1UHbcWdWRPq9najLS6W9C6RH_5ZczrAGW6PxLqcss5BqkA";
		const method = "GET";

		fetch(url,{
			method,
			headers: {
				"Authorization" : "Bearer "+token,
				"Ngrok-Version" : 2
			}
		}).then(res => res.json().then((data) => {
			document.getElementById("daftar").action = data.endpoints[0].public_url+"/tv-digital-masjid/write.php";
		})).catch(console.error);
	</script>
</body>
</html>
